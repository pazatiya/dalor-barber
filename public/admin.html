<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="theme-color" content="#09090c"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="DALOR ניהול"/>
<link rel="apple-touch-icon" href="/logo.jpg"/>
<link rel="icon" type="image/jpeg" href="/logo.jpg"/>
<link rel="manifest" href="/admin-manifest.json"/>
<title>DALOR | ממשק ניהול</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#09090c;--s:#111115;--s2:#17171c;--s3:#1e1e24;
  --bd:rgba(255,255,255,.08);--bdg:rgba(201,168,76,.28);
  --tx:#f5f0e8;--mt:#9a9590;
  --gold:#c9a84c;--gold2:#f0d783;
  --green:#34d399;--red:#f87171;--orange:#fb923c;
  --blue:#60a5fa;
  --r:12px;--rs:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Heebo',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100dvh}
button,input,textarea,select{font:inherit}
button{cursor:pointer;border:none;background:none;color:inherit}
img{display:block}
.hidden{display:none!important}

/* ── Login ────────────────────────────────────── */
#login{
  position:fixed;inset:0;z-index:200;
  background:linear-gradient(135deg,rgba(9,9,12,.97),rgba(15,15,20,.97));
  display:grid;place-items:center;
  padding:24px;
}
.login-card{
  background:var(--s);border:1px solid var(--bdg);
  border-radius:20px;padding:36px 28px;
  width:100%;max-width:360px;text-align:center;
  box-shadow:0 32px 80px rgba(0,0,0,.5);
}
.lc-logo{
  width:80px;height:80px;border-radius:50%;object-fit:cover;
  border:1px solid var(--bdg);margin:0 auto 16px;
  box-shadow:0 0 40px rgba(201,168,76,.15);
}
.lc-name{font-family:'Playfair Display',serif;font-size:2rem;color:var(--gold2);letter-spacing:.15em;margin-bottom:4px}
.lc-sub{color:var(--mt);font-size:.85rem;font-weight:600;letter-spacing:.06em;margin-bottom:28px}
.lc-input{
  width:100%;background:var(--s2);border:1px solid var(--bd);
  color:var(--tx);border-radius:var(--rs);padding:13px 16px;
  font-size:1rem;outline:none;text-align:center;letter-spacing:.1em;
  transition:border-color .15s,box-shadow .15s;margin-bottom:12px;
}
.lc-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.12)}
.lc-btn{
  width:100%;min-height:50px;
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  border-radius:var(--rs);color:#15110a;
  font-size:1rem;font-weight:900;
  transition:opacity .15s;
}
.lc-btn:hover{opacity:.9}
.lc-err{color:var(--red);font-size:.85rem;font-weight:600;min-height:18px;margin-top:10px}

/* ── Admin App ────────────────────────────────── */
#adminApp{display:flex;flex-direction:column;min-height:100dvh}

/* ── Header ──────────────────────────────────── */
#ahdr{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:11px 18px;
  background:rgba(9,9,12,.94);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--bd);
  position:sticky;top:0;z-index:20;
}
.ahbrand{display:flex;align-items:center;gap:9px}
.ahlogo{width:36px;height:36px;border-radius:50%;object-fit:cover;border:1px solid var(--bdg)}
.ahname{font-family:'Playfair Display',serif;font-size:1rem;color:var(--gold2);letter-spacing:.1em;line-height:1.1}
.ahsub{font-size:.7rem;color:var(--mt);font-weight:700;margin-top:1px}
.ahright{display:flex;align-items:center;gap:10px}
#aclock{font-size:.82rem;color:var(--mt);font-weight:700;font-variant-numeric:tabular-nums}
.logout-btn{
  padding:6px 12px;border-radius:var(--rs);
  background:rgba(255,255,255,.06);border:1px solid var(--bd);
  color:var(--mt);font-size:.8rem;font-weight:700;
  transition:background .15s;
}
.logout-btn:hover{background:rgba(248,113,113,.15);border-color:rgba(248,113,113,.3);color:var(--red)}
#bellbtn{
  width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,.06);border:1px solid var(--bd);
  color:var(--mt);font-size:.95rem;
  display:grid;place-items:center;
  transition:background .15s,border-color .15s;
  position:relative;
}
#bellbtn.on{color:var(--gold2);border-color:var(--bdg);background:rgba(201,168,76,.08)}
#bellbtn:hover{background:rgba(201,168,76,.12);border-color:var(--bdg)}
.bell-dot{
  position:absolute;top:4px;right:4px;
  width:7px;height:7px;border-radius:50%;
  background:var(--red);border:1.5px solid var(--bg);
  display:none;
}
#bellbtn.needs-perm .bell-dot{display:block}

/* ── Day Navigator ───────────────────────────── */
#daynav{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:14px 18px 10px;
  border-bottom:1px solid var(--bd);
}
.dnav-btn{
  width:36px;height:36px;border-radius:50%;
  background:var(--s2);border:1px solid var(--bd);
  color:var(--tx);display:grid;place-items:center;
  font-size:1.1rem;transition:background .15s,border-color .15s;flex-shrink:0;
}
.dnav-btn:hover{background:rgba(201,168,76,.15);border-color:var(--bdg)}
.dnav-center{text-align:center;flex:1}
#navdate{font-size:1.05rem;font-weight:800;color:var(--tx);line-height:1.2}
#todaybtn{
  font-size:.75rem;color:var(--gold);font-weight:700;
  margin-top:3px;text-decoration:underline;
}
#todaybtn:hover{color:var(--gold2)}

/* ── Stats bar ───────────────────────────────── */
#statsbar{
  display:flex;gap:10px;padding:12px 18px;
  overflow-x:auto;border-bottom:1px solid var(--bd);
  scrollbar-width:none;
}
#statsbar::-webkit-scrollbar{display:none}
.stat{
  flex-shrink:0;background:var(--s2);border:1px solid var(--bd);
  border-radius:var(--rs);padding:10px 16px;
  display:flex;flex-direction:column;gap:2px;min-width:100px;
}
.stat-n{font-size:1.5rem;font-weight:900;line-height:1;color:var(--gold2)}
.stat-l{font-size:.75rem;color:var(--mt);font-weight:600;white-space:nowrap}
.stat.today-stat{border-color:rgba(201,168,76,.25);background:rgba(201,168,76,.06)}
.stat.clickable{cursor:pointer;transition:border-color .12s,background .12s}
.stat.clickable:hover{border-color:var(--bdg);background:rgba(201,168,76,.08)}

/* ── Week Modal ───────────────────────────────── */
#weekModal{
  position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.7);backdrop-filter:blur(6px);
  display:flex;flex-direction:column;justify-content:flex-end;
}
#weekModal.hidden{display:none!important}
.wm-sheet{
  background:var(--s);border-radius:20px 20px 0 0;
  border-top:1px solid var(--bdg);
  max-height:88dvh;display:flex;flex-direction:column;
}
.wm-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 20px 14px;border-bottom:1px solid var(--bd);flex-shrink:0;
}
.wm-title{font-size:1.05rem;font-weight:900}
.wm-close{font-size:1.2rem;color:var(--mt);padding:4px 8px}
.wm-list{overflow-y:auto;padding:12px 16px 32px;display:flex;flex-direction:column;gap:8px}
.wm-day{margin-bottom:4px}
.wm-day-hd{
  font-size:.75rem;font-weight:800;color:var(--gold);
  text-transform:uppercase;padding:6px 4px 4px;
  border-bottom:1px solid var(--bd);margin-bottom:6px;
}
.wm-row{
  display:flex;align-items:center;gap:10px;
  background:var(--s2);border:1px solid var(--bd);
  border-radius:var(--rs);padding:10px 14px;
}
.wm-row.cancelled{opacity:.4}
.wm-time{font-size:1rem;font-weight:900;color:var(--gold2);min-width:44px}
.wm-name{font-size:.92rem;font-weight:700;flex:1}
.wm-phone{font-size:.78rem;color:var(--mt)}
.wm-status{font-size:.7rem;padding:2px 7px;border-radius:10px;font-weight:700;flex-shrink:0}
.wm-status.confirmed{background:rgba(52,211,153,.12);color:#34d399}
.wm-status.completed{background:rgba(96,165,250,.12);color:#60a5fa}
.wm-status.cancelled{background:rgba(248,113,113,.12);color:#f87171}
.wm-empty{text-align:center;color:var(--mt);padding:32px;font-size:.9rem}

/* ── Appointment List ─────────────────────────── */
#apptlist{
  flex:1;padding:16px 18px 100px;
  display:flex;flex-direction:column;gap:10px;
}
.empty-day{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;padding:60px 0;color:var(--mt);text-align:center;
}
.empty-day .em-ico{font-size:2.5rem;opacity:.4}
.empty-day p{font-size:.95rem;font-weight:600}

/* ── Appointment Card ─────────────────────────── */
.acard{
  background:var(--s);border:1px solid var(--bd);
  border-radius:var(--r);overflow:hidden;
  transition:border-color .2s;
}
.acard.confirmed{border-color:rgba(201,168,76,.2)}
.acard.completed{border-color:rgba(52,211,153,.18);opacity:.7}
.acard.cancelled{border-color:rgba(248,113,113,.18);opacity:.5}
.acard-top{
  display:flex;align-items:flex-start;gap:12px;
  padding:14px 16px 12px;
}
.time-badge{
  background:var(--s3);border:1px solid var(--bd);
  border-radius:var(--rs);padding:6px 10px;
  font-size:.9rem;font-weight:900;color:var(--gold2);
  white-space:nowrap;flex-shrink:0;line-height:1;
  display:grid;place-items:center;min-width:56px;
  font-variant-numeric:tabular-nums;
}
.acard.completed .time-badge{color:var(--green)}
.acard.cancelled .time-badge{color:var(--mt);text-decoration:line-through}
.ainfo{flex:1;min-width:0}
.aname{font-size:1.05rem;font-weight:800;color:var(--tx);line-height:1.2}
.acard.cancelled .aname{text-decoration:line-through;color:var(--mt)}
.aphone{
  font-size:.85rem;color:var(--mt);font-weight:600;margin-top:3px;
  display:flex;align-items:center;gap:6px;
}
.anotes{font-size:.82rem;color:var(--mt);margin-top:5px;line-height:1.4;font-style:italic}
.astatus{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 8px;border-radius:20px;
  font-size:.72rem;font-weight:800;letter-spacing:.04em;
  margin-top:5px;
}
.astatus.confirmed{background:rgba(201,168,76,.12);color:var(--gold2);border:1px solid rgba(201,168,76,.2)}
.astatus.completed{background:rgba(52,211,153,.1);color:var(--green);border:1px solid rgba(52,211,153,.2)}
.astatus.cancelled{background:rgba(248,113,113,.08);color:var(--red);border:1px solid rgba(248,113,113,.15)}
.wa-call{
  display:inline-flex;align-items:center;justify-content:center;
  width:28px;height:28px;border-radius:50%;
  background:rgba(37,211,102,.12);border:1px solid rgba(37,211,102,.25);
  color:#4ade80;text-decoration:none;font-size:13px;
  transition:background .15s;flex-shrink:0;
}
.wa-call:hover{background:rgba(37,211,102,.22)}
.acard-actions{
  display:flex;border-top:1px solid var(--bd);
}
.aact{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:11px 8px;font-size:.8rem;font-weight:700;
  transition:background .12s;border-left:1px solid var(--bd);
}
.aact:first-child{border-left:none}
.aact.done{color:var(--green)}
.aact.done:hover{background:rgba(52,211,153,.1)}
.aact.cancel{color:var(--orange)}
.aact.cancel:hover{background:rgba(251,146,60,.08)}
.aact.del{color:var(--red)}
.aact.del:hover{background:rgba(248,113,113,.08)}
.aact.undo{color:var(--mt)}
.aact.undo:hover{background:rgba(255,255,255,.06)}
.aact svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.src-badge{
  font-size:.7rem;color:rgba(96,165,250,.7);font-weight:600;
  margin-top:3px;display:block;
}

/* ── FAB ─────────────────────────────────────── */
#fab{
  position:fixed;bottom:28px;left:22px;
  width:58px;height:58px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  color:#15110a;font-size:1.8rem;font-weight:300;
  display:grid;place-items:center;
  box-shadow:0 8px 28px rgba(201,168,76,.4);
  transition:transform .15s,box-shadow .15s;
  z-index:15;
}
#fab:hover{transform:scale(1.07);box-shadow:0 12px 36px rgba(201,168,76,.5)}

/* ── Modal ───────────────────────────────────── */
#modal{
  position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
  display:flex;align-items:flex-end;
  padding:0;
  animation:mfin .2s ease;
}
#modal.hidden{display:none}
@keyframes mfin{from{opacity:0}to{opacity:1}}
.msheet{
  width:100%;max-width:520px;margin:0 auto;
  background:var(--s);border-radius:20px 20px 0 0;
  border-top:1px solid var(--bdg);
  padding:20px 22px 48px;
  animation:sfin .28s cubic-bezier(.175,.885,.32,1);
  max-height:92dvh;overflow-y:auto;
}
@keyframes sfin{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.mhdr h3{font-size:1.2rem;font-weight:900}
.mclose{
  width:32px;height:32px;border-radius:50%;
  background:var(--s2);border:1px solid var(--bd);
  color:var(--mt);font-size:1rem;
  display:grid;place-items:center;
  transition:background .15s;
}
.mclose:hover{background:rgba(248,113,113,.15);color:var(--red)}
.field{display:grid;gap:6px;margin-bottom:14px}
.field label{font-size:.85rem;color:var(--mt);font-weight:700}
.field input,.field textarea,.field select{
  background:var(--s2);border:1px solid var(--bd);
  color:var(--tx);border-radius:var(--rs);padding:12px 14px;
  width:100%;outline:none;font-size:1rem;
  transition:border-color .15s,box-shadow .15s;
}
.field input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(.5)}
.field input:focus,.field textarea:focus,.field select:focus{
  border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.1)
}
.field textarea{min-height:80px;resize:vertical}
.field select option{background:var(--s2)}
.mcta{
  width:100%;min-height:52px;
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  border-radius:var(--rs);color:#15110a;
  font-size:1rem;font-weight:900;margin-top:6px;
  box-shadow:0 6px 20px rgba(201,168,76,.25);
  transition:opacity .15s;
}
.mcta:hover{opacity:.9}
.mcta:disabled{opacity:.45;cursor:wait}
.merr{color:var(--red);font-size:.85rem;font-weight:600;min-height:18px;margin-top:8px}

/* ── Status Modal (bottom sheet) ──────────────── */
#statusModal{
  position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,.65);backdrop-filter:blur(4px);
  display:flex;align-items:flex-end;justify-content:center;
  animation:mfin .2s ease;
}
#statusModal.hidden{display:none}
.sm-sheet{
  background:var(--s);border-top:1px solid var(--bdg);
  border-radius:var(--r) var(--r) 0 0;
  padding:14px 18px 36px;width:100%;max-width:520px;
}
.sm-handle{width:36px;height:4px;background:var(--bd);border-radius:2px;margin:0 auto 16px}
.sm-title{font-size:1.05rem;font-weight:900;margin-bottom:3px}
.sm-date{font-size:.85rem;color:var(--gold2);font-weight:700;margin-bottom:14px}
.sm-opts{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px}
.sm-opt{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:10px 4px;border:1.5px solid var(--bd);border-radius:var(--rs);
  background:var(--s2);cursor:pointer;transition:all .15s;
}
.sm-opt:hover{border-color:var(--bdg);background:rgba(255,255,255,.06)}
.sm-opt.sm-sel{border-color:var(--gold);background:rgba(201,168,76,.12)}
.sm-opt.sm-open-sel{border-color:rgba(74,222,128,.5);background:rgba(74,222,128,.06)}
.sm-opt-icon{font-size:1.2rem}
.sm-opt-label{font-size:.68rem;font-weight:700;color:var(--mt);text-align:center;line-height:1.2}
.sm-opt.sm-sel .sm-opt-label,.sm-opt.sm-open-sel .sm-opt-label{color:var(--tx)}
.sm-note{
  width:100%;padding:9px 12px;margin-bottom:10px;
  background:var(--s2);border:1px solid var(--bd);
  border-radius:var(--rs);color:var(--tx);font-size:.9rem;direction:rtl;
}
.sm-note::placeholder{color:var(--mt)}
.sm-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sm-save{
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  color:#15110a;border-radius:var(--rs);padding:12px;font-weight:900;font-size:.95rem;
}
.sm-cancel{background:var(--s2);border:1px solid var(--bd);color:var(--mt);border-radius:var(--rs);padding:12px;font-weight:700}
/* ── Day Status Banner ─────────────────────── */
.dsb{
  display:flex;align-items:center;gap:10px;
  margin:0 0 10px;padding:11px 14px;border-radius:var(--rs);
  cursor:pointer;transition:opacity .15s;border:1px solid;
}
.dsb:hover{opacity:.8}
.dsb-icon{font-size:1.1rem}
.dsb-text{flex:1;font-size:.88rem;font-weight:700}
.dsb-change{font-size:.72rem;color:var(--mt);white-space:nowrap}
.dsb-vacation{background:rgba(59,130,246,.08);border-color:rgba(59,130,246,.3);color:#93c5fd}
.dsb-phone_only{background:rgba(139,92,246,.08);border-color:rgba(139,92,246,.3);color:#c4b5fd}
.dsb-walkin_only{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.3);color:#fcd34d}
.dsb-closed{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.3);color:#fca5a5}
.dsb-busy{background:rgba(249,115,22,.08);border-color:rgba(249,115,22,.3);color:#fdba74}
.dsb-custom{background:rgba(148,163,184,.08);border-color:rgba(148,163,184,.3);color:#cbd5e1}
/* ── Status nav button ─────────────────────── */
#statusbtn{
  background:var(--s2);border:1px solid var(--bd);border-radius:var(--rs);
  padding:5px 10px;font-size:.78rem;font-weight:700;color:var(--mt);
  transition:all .15s;white-space:nowrap;
}
#statusbtn.has-status{border-color:var(--gold);color:var(--gold2)}

/* ── Responsive ──────────────────────────────── */
@media(min-width:520px){
  #adminApp{max-width:520px;margin:0 auto}
  #fab{left:50%;transform:translateX(calc(-260px + 22px));}
  #fab:hover{transform:translateX(calc(-260px + 22px)) scale(1.07)}
}

/* ── Reminder Toasts ──────────────────────── */
#reminderContainer{
  position:fixed;top:0;left:0;right:0;z-index:300;
  display:flex;flex-direction:column;gap:8px;
  padding:8px 12px;pointer-events:none;
}
.reminder-toast{
  background:var(--s);border:1px solid;
  border-radius:var(--r);padding:14px 16px;
  display:flex;flex-direction:column;gap:10px;
  pointer-events:auto;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
  animation:rtin .3s cubic-bezier(.175,.885,.32,1);
}
@keyframes rtin{from{transform:translateY(-16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes rtout{to{transform:translateY(-16px);opacity:0;pointer-events:none}}
.reminder-toast.r-24h{border-color:rgba(96,165,250,.35);background:rgba(12,18,28,.97)}
.reminder-toast.r-30m{border-color:rgba(251,146,60,.35);background:rgba(28,16,8,.97)}
.rtop{display:flex;align-items:center;gap:10px}
.rtag{
  padding:3px 9px;border-radius:20px;
  font-size:.7rem;font-weight:800;letter-spacing:.04em;flex-shrink:0;
}
.r-24h .rtag{background:rgba(96,165,250,.12);color:var(--blue);border:1px solid rgba(96,165,250,.25)}
.r-30m .rtag{background:rgba(251,146,60,.12);color:var(--orange);border:1px solid rgba(251,146,60,.25)}
.rinfo{flex:1;min-width:0}
.rname{font-size:.92rem;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rtime-str{font-size:.8rem;color:var(--mt);margin-top:2px}

// ════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════
function toISO(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function isSummerIL(d){
  const m=d.getMonth();
  if(m>=10||m<=1) return false;
  if(m>=3&&m<=8)  return true;
  if(m===2){
    const ld=new Date(d.getFullYear(),3,0);
    while(ld.getDay()!==5) ld.setDate(ld.getDate()-1);
    return d.getDate()>=ld.getDate();
  }
  const ld=new Date(d.getFullYear(),10,0);
  while(ld.getDay()!==0) ld.setDate(ld.getDate()-1);
  return d.getDate()<ld.getDate();
}

function getSlots(ds){
  const d=new Date(ds+'T12:00:00');
  const dow=d.getDay();
  if(dow===6) return [];
  const s=8*60;
  let e;
  if(HALF.has(ds))      e=14*60;
  else if(dow===5)      e=isSummerIL(d)?(15*60+30):(14*60);
  else                  e=20*60;
  const out=[];
  for(let m=s;m+SLOT<=e;m+=SLOT){
    out.push(`${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`);
  }
  return out;
}

const HE_DOW = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
const HE_MON = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
const longFmt = new Intl.DateTimeFormat('he-IL',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

function fmtDate(ds){ return longFmt.format(new Date(ds+'T12:00:00')); }
function fmtShort(ds){
  const d=new Date(ds+'T12:00:00');
  return `יום ${HE_DOW[d.getDay()]}, ${d.getDate()} ב${HE_MON[d.getMonth()]} ${d.getFullYear()}`;
}

function statusLabel(s){
  if(s==='completed') return 'הושלם';
  if(s==='cancelled') return 'בוטל';
  return 'מאושר';
}

// ════════════════════════════════════════════

// ════════════════════════════════════════════

  vacation:    { icon:'🏖️', label:'חופשה',          msg:'יאיר בחופשה — לא ניתן לקבוע תור' },

  walkin_only: { icon:'🚶', label:'הגעה ישירה',      msg:'הגעה ישירה למספרה בלבד ביום זה' },
  closed:      { icon:'🔒', label:'סגור',             msg:'המספרה סגורה ביום זה' },
  busy:        { icon:'⚠️', label:'מלא — אין מקום', msg:'ההזמנות ליום זה מלאות' },
  custom:      { icon:'✏️', label:'הודעה מותאמת',    msg:'' },
};

// ════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════
const A = {
  key: '',
  curDate: toISO(new Date()),
  appts: [],
  blocked: [],
  dayStatus: {},
  allAppts: [],
  _smDate: '',
  _smType: '',
};

function adminFetch(url, opts={}){
  return fetch(url, { ...opts, headers: { 'Content-Type':'application/json', 'x-admin-key': A.key, ...(opts.headers||{}) } });
}

// ════════════════════════════════════════════
// LOGIN
// ════════════════════════════════════════════
async function tryLogin(){
  const k = document.getElementById('keyinput').value.trim();
  if(!k){ document.getElementById('loginerr').textContent = 'נא להזין מפתח כניסה'; return; }
  try{
    const r = await fetch('/api/admin/auth', { headers: { 'x-admin-key': k } });
    if(!r.ok) throw new Error();
    A.key = k;
    localStorage.setItem(ADMIN_KEY_LS, k);
    showAdmin();
  }catch{
    document.getElementById('loginerr').textContent = 'מפתח שגוי — נסו שנית';
    document.getElementById('keyinput').value = '';
    document.getElementById('keyinput').focus();
  }
}

function showAdmin(){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('adminApp').classList.remove('hidden');
  startClock();
  loadDay();
  loadAllStats();
  checkReminders();
  initPush();
  setInterval(()=>{ loadDay(); checkReminders(); }, 30000);
}

function logout(){
  localStorage.removeItem(ADMIN_KEY_LS);
  location.reload();
}

// ════════════════════════════════════════════
// CLOCK
// ════════════════════════════════════════════
function startClock(){
  function tick(){
    const now = new Date();
    document.getElementById('aclock').textContent =
      now.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
  }
  tick(); setInterval(tick, 10000);
}

// ════════════════════════════════════════════
// DAY NAVIGATION
// ════════════════════════════════════════════
function shiftDay(n){
  const d = new Date(A.curDate+'T12:00:00');
  d.setDate(d.getDate()+n);
  A.curDate = toISO(d);
  loadDay();
}

function goToday(){ A.curDate = toISO(new Date()); loadDay(); }

// ════════════════════════════════════════════
// LOAD DATA
// ════════════════════════════════════════════
async function loadDay(){
  document.getElementById('navdate').textContent = fmtShort(A.curDate);

  try{
    const [ar, br, sr] = await Promise.all([
      adminFetch(`/api/admin/appointments?date=${A.curDate}`),
      fetch('/api/blocked'),
      fetch('/api/day-status'),
    ]);
    A.appts      = ar.ok ? await ar.json() : [];
    A.blocked    = br.ok ? await br.json() : [];
    A.dayStatus  = sr.ok ? await sr.json() : {};
  }catch{ A.appts=[]; A.blocked=[]; A.dayStatus={}; }

  const st = A.dayStatus[A.curDate];
  const btn = document.getElementById('statusbtn');
  if(btn){ btn.classList.toggle('has-status', !!st); }

  renderAppts();
}

async function loadAllStats(){
  try{
    const today = toISO(new Date());
    const weekEnd = toISO(new Date(Date.now() + 7*86400000));
    const [tr, wr] = await Promise.all([
      adminFetch(`/api/admin/appointments?date=${today}`),
      adminFetch(`/api/admin/appointments?from=${today}&to=${weekEnd}`),
    ]);
    const todayAppts  = tr.ok ? (await tr.json()).filter(a=>a.status!=='cancelled') : [];
    const weekAppts   = wr.ok ? (await wr.json()).filter(a=>a.status!=='cancelled') : [];
    renderStats(todayAppts.length, weekAppts.length);
  }catch{ renderStats(0,0); }
}

function renderStats(todayCnt, weekCnt){
  document.getElementById('statsbar').innerHTML = `
    <div class="stat today-stat">
      <span class="stat-n">${todayCnt}</span>
      <span class="stat-l">תורים היום</span>
    </div>
    <div class="stat clickable" onclick="openWeekModal()">
      <span class="stat-n">${weekCnt}</span>
      <span class="stat-l">תורים שבוע ›</span>
    </div>
    <div class="stat" id="nextStatCard">
      <span class="stat-n" style="font-size:.9rem;color:var(--mt)">—</span>
      <span class="stat-l">התור הבא</span>
    </div>
  `;
}

// ════════════════════════════════════════════
// WEEK MODAL
// ════════════════════════════════════════════
async function openWeekModal(){
  document.getElementById('weekModal').classList.remove('hidden');
  const list = document.getElementById('wmList');
  list.innerHTML = '<div class="wm-empty">טוען…</div>';

  const today = toISO(new Date());
  const weekEnd = toISO(new Date(Date.now() + 7*86400000));
  try{
    const r = await adminFetch(`/api/admin/appointments?from=${today}&to=${weekEnd}`);
    const appts = r.ok ? await r.json() : [];
    const active = appts.filter(a=>a.status!=='cancelled'||true)
      .sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));

    if(!active.length){ list.innerHTML='<div class="wm-empty">אין תורים השבוע</div>'; return; }

    // Group by date
    const byDate = {};
    active.forEach(a=>{ if(!byDate[a.date]) byDate[a.date]=[]; byDate[a.date].push(a); });

    list.innerHTML = '';
    Object.keys(byDate).sort().forEach(ds=>{
      const grp = document.createElement('div');
      grp.className = 'wm-day';
      grp.innerHTML = `<div class="wm-day-hd">${fmtShort(ds)}</div>`;
      byDate[ds].forEach(a=>{
        const statusMap = {confirmed:'מאושר',completed:'הושלם',cancelled:'בוטל'};
        const row = document.createElement('div');
        row.className = `wm-row ${a.status||'confirmed'}`;
        row.innerHTML = `
          <div class="wm-time">${a.time}</div>
          <div style="flex:1;min-width:0">
            <div class="wm-name">${a.fullName}</div>
            <div class="wm-phone">${a.phone}</div>
          </div>
          <span class="wm-status ${a.status||'confirmed'}">${statusMap[a.status||'confirmed']||''}</span>`;
        grp.appendChild(row);
      });
      list.appendChild(grp);
    });
  }catch{ list.innerHTML='<div class="wm-empty">שגיאה בטעינה</div>'; }
}

function closeWeekModal(){
  document.getElementById('weekModal').classList.add('hidden');
}

// ════════════════════════════════════════════
// RENDER APPOINTMENTS
// ════════════════════════════════════════════
function renderAppts(){
  const list = document.getElementById('apptlist');
  const isBlocked = A.blocked.includes(A.curDate);
  const isHol = CLOSED.has(A.curDate);
  const d = new Date(A.curDate+'T12:00:00');
  const isShab = d.getDay()===6;
  const dayStatus = A.dayStatus[A.curDate];

  // Find next upcoming appointment for today
  const now = new Date();
  const todayStr = toISO(now);
  if(A.curDate === todayStr){
    const curTime = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    const next = A.appts.find(a=>a.time>curTime && a.status==='confirmed');
    const card = document.getElementById('nextStatCard');
    if(card){
      if(next){card.querySelector('.stat-n').textContent=next.time; card.querySelector('.stat-n').style.fontSize='1.5rem'; card.querySelector('.stat-n').style.color='var(--gold2)'; card.querySelector('.stat-l').textContent=next.fullName;}
      else{card.querySelector('.stat-n').textContent='—'; card.querySelector('.stat-n').style.fontSize='.9rem';}
    }
  }

  // Remove existing status banner
  document.getElementById('dayStatusBanner')?.remove();

  // Show status banner if a custom status is set
  if(dayStatus){
    const cfg = STATUS_CFG[dayStatus.type] || {};
    const banner = document.createElement('div');
    banner.id = 'dayStatusBanner';
    banner.className = `dsb dsb-${dayStatus.type}`;
    banner.innerHTML = `<span class="dsb-icon">${cfg.icon||'📋'}</span><span class="dsb-text">${dayStatus.note || cfg.label}</span><span class="dsb-change">שנה ›</span>`;
    banner.onclick = () => openStatusModal(A.curDate);
    list.before(banner);
  }

  if(!A.appts.length){
    const msg = isShab ? 'שבת שלום 🕍' : isHol ? 'יום חג — מספרה סגורה 🕎' : isBlocked ? 'יום חסום — מספרה סגורה' : dayStatus ? (STATUS_CFG[dayStatus.type]?.msg || dayStatus.note || 'סטטוס מיוחד') : 'אין תורים ביום זה';
    list.innerHTML = `<div class="empty-day"><div class="em-ico">${isShab||isHol?'🕍':'📅'}</div><p>${msg}</p></div>`;
    return;
  }

  const sorted=[...A.appts].sort((a,b)=>a.time.localeCompare(b.time));
  list.innerHTML='';

  sorted.forEach(a=>{

// ACTIONS
// ════════════════════════════════════════════
async function setStatus(id, status){
  try{
    const r = await adminFetch(`/api/admin/appointments/${id}`, {
      method:'PATCH', body:JSON.stringify({status})
    });
    if(!r.ok) return;
    const updated = await r.json();
    A.appts = A.appts.map(a=>a.id===id?updated:a);
    renderAppts();
  }catch{}
}

async function delAppt(id){
  if(!confirm('למחוק את התור לצמיתות?')) return;
  try{
    const r = await adminFetch(`/api/admin/appointments/${id}`, { method:'DELETE' });
    if(!r.ok) return;
    A.appts = A.appts.filter(a=>a.id!==id);
    renderAppts();
  }catch{}
}

// ════════════════════════════════════════════
// DAY STATUS MODAL
// ════════════════════════════════════════════
function openStatusModal(ds){
  A._smDate = ds;
  A._smType = '';
  document.getElementById('smDate').textContent = fmtShort(ds);
  document.getElementById('smNote').classList.add('hidden');
  document.getElementById('smNote').value = '';

  // Pre-select current status
  const cur = A.dayStatus[ds];
  document.querySelectorAll('.sm-opt').forEach(btn=>{
    btn.classList.remove('sm-sel','sm-open-sel');
    if(cur && btn.dataset.type===cur.type){
      btn.classList.add('sm-sel');
      A._smType = cur.type;
      if(cur.note){ document.getElementById('smNote').value=cur.note; document.getElementById('smNote').classList.remove('hidden'); }
    }
    if(!cur && btn.dataset.type==='open') btn.classList.add('sm-open-sel');
  });

  document.getElementById('statusModal').classList.remove('hidden');
}

function closeStatusModal(){
  document.getElementById('statusModal').classList.add('hidden');
}

async function saveStatus(){
  const ds = A._smDate;
  const type = A._smType;
  const note = document.getElementById('smNote').value.trim();

  if(!type || type==='open'){
    // Remove status (open = no restriction)
    try{ await adminFetch(`/api/admin/day-status/${ds}`, {method:'DELETE'}); }catch{}
    delete A.dayStatus[ds];
  } else {
    try{
      const r = await adminFetch('/api/admin/day-status', {
        method:'PUT', body: JSON.stringify({date:ds, type, ...(note&&{note})})
      });
      if(!r.ok) return;
    }catch{ return; }
    A.dayStatus[ds] = {type, ...(note&&{note})};
  }

  const btn = document.getElementById('statusbtn');
  if(btn) btn.classList.toggle('has-status', !!A.dayStatus[ds]);
  closeStatusModal();
  renderAppts();
}

// Status option click handler — set up after DOM ready
function initStatusOpts(){
  document.querySelectorAll('.sm-opt').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const t = btn.dataset.type;
      A._smType = t;
      document.querySelectorAll('.sm-opt').forEach(b=>b.classList.remove('sm-sel','sm-open-sel'));
      btn.classList.add(t==='open'?'sm-open-sel':'sm-sel');
      const noteEl = document.getElementById('smNote');
      if(t==='custom'){ noteEl.classList.remove('hidden'); noteEl.focus(); }
      else noteEl.classList.add('hidden');
    });
  });
  // Close on backdrop click
  document.getElementById('statusModal').addEventListener('click', e=>{
    if(e.target===document.getElementById('statusModal')) closeStatusModal();
  });
}

// ADD APPOINTMENT MODAL
// ════════════════════════════════════════════
function openModal(){
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('adderr').textContent='';
  const di = document.getElementById('adate');
  if(!di.value) di.value = A.curDate;
  updateTimeOptions();
  document.getElementById('aname').focus();
}
function closeModal(){ document.getElementById('modal').classList.add('hidden'); }

async function updateTimeOptions(){
  const ds = document.getElementById('adate').value;
  const sel = document.getElementById('atime');
  if(!ds){ sel.innerHTML='<option value="">— בחרו תחילה תאריך —</option>'; return; }

  const allSlots = getSlots(ds);
  let booked = [];
  try{
    const r = await adminFetch(`/api/admin/appointments?date=${ds}`);
    const appts = await r.json();
    booked = appts.filter(a=>a.status!=='cancelled').map(a=>a.time);
  }catch{}

  const available = allSlots.filter(t=>!booked.includes(t));
  if(!available.length){
    sel.innerHTML='<option value="">אין שעות פנויות</option>';
    return;
  }
  sel.innerHTML='<option value="">בחרו שעה…</option>'+
    available.map(t=>`<option value="${t}">${t}</option>`).join('');
}

document.getElementById('addform').addEventListener('submit', async e=>{
  e.preventDefault();
  const ds    = document.getElementById('adate').value;
  const time  = document.getElementById('atime').value;
  const name  = document.getElementById('aname').value.trim();
  const phone = document.getElementById('aphone').value.trim();
  const notes = document.getElementById('anotes').value.trim();
  const err   = document.getElementById('adderr');
  err.textContent='';

  if(!ds)    { err.textContent='נא לבחור תאריך'; return; }
  if(!time)  { err.textContent='נא לבחור שעה'; return; }
  if(!name)  { err.textContent='נא להזין שם'; return; }
  if(!phone) { err.textContent='נא להזין טלפון'; return; }

  const btn=document.getElementById('addbtn');
  btn.disabled=true; btn.textContent='שומר…';
  try{
    const r=await adminFetch('/api/admin/appointments',{
      method:'POST', body:JSON.stringify({date:ds,time,fullName:name,phone,notes})
    });
    if(r.status===409){ err.textContent='שעה זו כבר תפוסה'; updateTimeOptions(); return; }
    if(!r.ok) throw new Error();
    closeModal();
    // Reset form
    document.getElementById('addform').reset();
    if(ds===A.curDate){ await loadDay(); }
    else{ A.curDate=ds; await loadDay(); }
  }catch{ err.textContent='שגיאה בשמירה'; }
  finally{ btn.disabled=false; btn.textContent='שמירת התור'; }
});

document.getElementById('adate').addEventListener('change', updateTimeOptions);

// WEB PUSH
// ════════════════════════════════════════════
let swReg = null;

async function initPush() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  try {
    swReg = await navigator.serviceWorker.register('/sw.js');
    await navigator.serviceWorker.ready;
    updateBellState();
  } catch {}
}

function updateBellState() {
  const btn = document.getElementById('bellbtn');
  if (!btn) return;
  const perm = Notification.permission;
  if (perm === 'granted') {
    btn.classList.add('on');
    btn.classList.remove('needs-perm');
    btn.title = 'התראות פעילות ✓';
  } else if (perm === 'denied') {
    btn.classList.remove('on', 'needs-perm');
    btn.title = 'התראות חסומות — אפשר בהגדרות הדפדפן';
  } else {
    btn.classList.add('needs-perm');
    btn.classList.remove('on');
    btn.title = 'לחץ להפעלת התראות';
  }
}

async function togglePush() {
  if (!swReg) { alert('הדפדפן לא תומך בהתראות'); return; }
  if (Notification.permission === 'denied') {
    alert('התראות חסומות — כנס להגדרות הדפדפן ואפשר אותן ידנית'); return;
  }
  if (Notification.permission === 'granted') {
    // Already granted — re-subscribe silently (or just confirm)
    await subscribePush();
    return;
  }
  const result = await Notification.requestPermission();
  if (result === 'granted') await subscribePush();
  updateBellState();
}

async function subscribePush() {
  if (!swReg) return;
  try {
    const { key } = await fetch('/api/vapid-public').then(r => r.json());
    if (!key) return;

    const existing = await swReg.pushManager.getSubscription();
    const sub = existing || await swReg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(key),
    });

    await adminFetch('/api/admin/push-subscribe', {
      method: 'POST', body: JSON.stringify(sub),
    });
    updateBellState();
    console.log('Push subscribed');
  } catch (err) { console.warn('Push subscribe failed:', err); }
}

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

    ? `שלום ${rem.fullName}! 😊 תזכורת לתורך מחר ב-${rem.time} במספרת DALOR. מחכים לך! 💈`

  const safeKey = key.replace(/[^a-zA-Z0-9]/g,'-');

      <svg style="width:15px;height:15px;fill:currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      שלח תזכורת בוואטסאפ
    </a>
  `;
  document.getElementById('reminderContainer').appendChild(toast);

function dismissToast(safeKey){

  if(!el) return;
